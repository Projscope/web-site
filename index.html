<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projscope — Software Architecture &amp; Development</title>
  <meta name="description" content="Projscope delivers expert software architecture, full-stack development, rapid prototyping, and AI-powered solutions for modern businesses.">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#0d9488">

  <!-- Canonical (default; overridden per-route by useSEO hook) -->
  <link rel="canonical" href="https://projscope.com/">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Projscope">
  <meta property="og:url" content="https://projscope.com/">
  <meta property="og:title" content="Projscope — Software Architecture &amp; Development">
  <meta property="og:description" content="Projscope delivers expert software architecture, full-stack development, rapid prototyping, and AI-powered solutions for modern businesses.">
  <meta property="og:image" content="https://projscope.com/og-default.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Projscope — Software Architecture &amp; Development">
  <meta name="twitter:description" content="Projscope delivers expert software architecture, full-stack development, rapid prototyping, and AI-powered solutions for modern businesses.">
  <meta name="twitter:image" content="https://projscope.com/og-default.png">

  <!-- Icons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/favicon.ico">

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- JSON-LD: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Projscope",
    "url": "https://projscope.com",
    "logo": "https://projscope.com/logo.svg",
    "description": "IT consulting and software development company specialising in software architecture, full-stack development, rapid prototyping, and AI-powered solutions.",
    "contactPoint": {
      "@type": "ContactPoint",
      "telephone": "+1-204-797-1681",
      "email": "support@projscope.com",
      "contactType": "customer service"
    }
  }
  </script>

  <!-- JSON-LD: WebSite -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Projscope",
    "url": "https://projscope.com"
  }
  </script>
</head>
<body>
  <!-- Netlify Forms: hidden form for build-time detection -->
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input name="bot-field" />
    <input name="name" />
    <input name="company" />
    <input name="email" />
    <input name="phone" />
    <textarea name="message"></textarea>
  </form>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
